<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;
  background:#1E2320;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.login-card{
  background:#F4F1F0;
  border-radius:20px;
  padding:48px 40px;
  max-width:380px;
  width:100%;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.lock-icon{font-size:42px;margin-bottom:18px;}
.login-title{
  font-family:'Playfair Display',serif;
  font-size:24px;
  font-weight:700;
  color:#1E2320;
  margin-bottom:6px;
}
.login-sub{
  font-size:13px;
  color:#6B6B5E;
  margin-bottom:28px;
}
.pw-input{
  width:100%;
  padding:14px 16px;
  border-radius:10px;
  border:1px solid rgba(30,35,32,0.15);
  background:white;
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  margin-bottom:14px;
  outline:none;
  transition:border-color .2s;
}
.pw-input:focus{border-color:#4AA834;}
.unlock-btn{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#4AA834;
  color:white;
  font-size:14px;
  font-weight:700;
  letter-spacing:0.5px;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:background .2s;
}
.unlock-btn:hover{background:#3d8c2a;}
.error-msg{
  color:#D94F4F;
  font-size:12.5px;
  margin-top:12px;
  display:none;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="lock-icon">🔒</div>
  <div class="login-title">Relatório Financeiro</div>
  <div class="login-sub">Digite a senha para visualizar</div>
  <input type="password" class="pw-input" id="senha" placeholder="Senha" onkeypress="if(event.key==='Enter')desbloquear()">
  <button class="unlock-btn" onclick="desbloquear()">DESBLOQUEAR</button>
  <div class="error-msg" id="erro">Senha incorreta. Tente novamente.</div>
</div>

<script>
function desbloquear(){
  const senha = document.getElementById('senha').value;
  const erro = document.getElementById('erro');
  if(senha === 'jose123'){
    window.location.href = 'DashJosePF.html';
  } else {
    erro.style.display = 'block';
  }
}
</script>

</body>
</html>
